services:
  # Backend API
  - type: web
    name: sicbo-server
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    rootDir: server
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
    healthCheckPath: /health

  # Frontend Static Site
  - type: web
    name: sicbo-client
    env: static
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    rootDir: client
    envVars:
      - key: REACT_APP_API_URL
        sync: false
